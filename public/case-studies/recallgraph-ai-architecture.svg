<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">RecallGraph AI Architecture</title>
  <desc id="desc">RecallGraph AI product-safety RAG architecture with source adapters, storage, agents, eval gates, traces, and review surfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#67e8f9"/>
    </marker>
    <style>
      .title { fill: #f8fafc; font: 700 28px Inter, Arial, sans-serif; }
      .subtitle { fill: #94a3b8; font: 500 15px Inter, Arial, sans-serif; }
      .label { fill: #f8fafc; font: 700 14px Inter, Arial, sans-serif; }
      .small { fill: #cbd5e1; font: 500 12px Inter, Arial, sans-serif; }
      .tiny { fill: #94a3b8; font: 500 11px Inter, Arial, sans-serif; }
      .node { fill: #0f2744; stroke: #22d3ee; stroke-width: 1.8; rx: 12; }
      .green { fill: #0f2f2a; stroke: #34d399; stroke-width: 1.8; rx: 12; }
      .amber { fill: #3b2a11; stroke: #f59e0b; stroke-width: 1.8; rx: 12; }
      .purple { fill: #2e1b4b; stroke: #a78bfa; stroke-width: 1.8; rx: 12; }
      .red { fill: #3a1d25; stroke: #fb7185; stroke-width: 1.8; rx: 12; }
      .edge { fill: none; stroke: #67e8f9; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" class="title">RecallGraph AI Architecture</text>
  <text x="600" y="76" text-anchor="middle" class="subtitle">RAG, multi-agent orchestration, eval gates, and LLMOps over public product-safety data</text>

  <rect x="55" y="145" width="135" height="78" class="node"/>
  <text x="122" y="174" text-anchor="middle" class="label">Public Sources</text>
  <text x="122" y="196" text-anchor="middle" class="small">CPSC, FDA, NHTSA</text>

  <rect x="250" y="145" width="135" height="78" class="green"/>
  <text x="318" y="174" text-anchor="middle" class="label">Ingestion</text>
  <text x="318" y="196" text-anchor="middle" class="small">fixtures + backfill</text>

  <rect x="445" y="145" width="135" height="78" class="amber"/>
  <text x="512" y="174" text-anchor="middle" class="label">Storage</text>
  <text x="512" y="196" text-anchor="middle" class="small">SQLite + pgvector</text>

  <rect x="640" y="145" width="135" height="78" class="purple"/>
  <text x="708" y="174" text-anchor="middle" class="label">Retrieval</text>
  <text x="708" y="196" text-anchor="middle" class="small">hybrid ranking</text>

  <rect x="835" y="145" width="135" height="78" class="purple"/>
  <text x="902" y="174" text-anchor="middle" class="label">Agent Flow</text>
  <text x="902" y="196" text-anchor="middle" class="small">verify, score, write</text>

  <rect x="1030" y="145" width="135" height="78" class="node"/>
  <text x="1098" y="174" text-anchor="middle" class="label">Cited Brief</text>
  <text x="1098" y="196" text-anchor="middle" class="small">API + workbench</text>

  <path d="M190 184 H250" class="edge"/>
  <path d="M385 184 H445" class="edge"/>
  <path d="M580 184 H640" class="edge"/>
  <path d="M775 184 H835" class="edge"/>
  <path d="M970 184 H1030" class="edge"/>

  <rect x="240" y="305" width="175" height="72" class="red"/>
  <text x="328" y="333" text-anchor="middle" class="label">Eval Gates</text>
  <text x="328" y="354" text-anchor="middle" class="small">retrieval + faithfulness</text>

  <rect x="512" y="305" width="175" height="72" class="red"/>
  <text x="600" y="333" text-anchor="middle" class="label">LLMOps</text>
  <text x="600" y="354" text-anchor="middle" class="small">traces + spans</text>

  <rect x="785" y="305" width="175" height="72" class="red"/>
  <text x="872" y="333" text-anchor="middle" class="label">Ops Drills</text>
  <text x="872" y="354" text-anchor="middle" class="small">audit, recovery, readiness</text>

  <path d="M708 223 C708 268 328 268 328 305" class="edge"/>
  <path d="M902 223 C902 268 600 268 600 305" class="edge"/>
  <path d="M1098 223 C1098 268 872 268 872 305" class="edge"/>

  <rect x="275" y="425" width="650" height="46" rx="12" fill="#164e63" stroke="#22d3ee" stroke-width="1.6"/>
  <text x="600" y="454" text-anchor="middle" class="label">GitHub-ready baseline: make validate, 85 tests, no credentials by default</text>
</svg>
