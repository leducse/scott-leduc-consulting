<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">TradingView webhook AWS POC validation screenshot</title>
  <desc id="desc">Sanitized validation evidence showing local build, local tests, and paper broker smoke test status.</desc>
  <rect width="1400" height="860" fill="#07111f"/>
  <rect x="56" y="48" width="1288" height="764" rx="18" fill="#0f172a" stroke="#155e75" stroke-width="2"/>
  <rect x="56" y="48" width="1288" height="62" rx="18" fill="#111827"/>
  <circle cx="92" cy="79" r="9" fill="#ef4444"/>
  <circle cx="122" cy="79" r="9" fill="#f59e0b"/>
  <circle cx="152" cy="79" r="9" fill="#22c55e"/>
  <text x="190" y="86" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="22">tradingview-webhook-aws-poc validation</text>

  <text x="92" y="162" fill="#22d3ee" font-family="Menlo, Consolas, monospace" font-size="24">$ make build-template</text>
  <text x="118" y="206" fill="#e2e8f0" font-family="Menlo, Consolas, monospace" font-size="22">build/cloudformation/tradingview-webhook-poc.template.json</text>
  <text x="118" y="244" fill="#e2e8f0" font-family="Menlo, Consolas, monospace" font-size="22">build/lambda/tv-aws-poc-lambda.zip</text>
